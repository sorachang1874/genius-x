# Local dev dependencies (PRD §3). Same storage classes as production (Postgres + Redis)
# so behavior matches — no SQLite/in-memory shortcuts on the workflow path (playbook
# runtime isolation). Shadow services (Langfuse, Payload) get added here later.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geniusx
      POSTGRES_PASSWORD: geniusx
      POSTGRES_DB: geniusx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geniusx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
