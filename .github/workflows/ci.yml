# DoD merge gate. Runs on every PR — agents must show green before a human merges
# (AGENTS.md: never auto-merge to main). Grows: + contract preflight, + lint, + unit,
# + scripted Lesson-1 smoke (fake providers) as those land.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (contract preflight — lesson-001 conforms to frozen LessonConfig)
        run: pnpm typecheck
