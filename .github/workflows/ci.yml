# DoD merge gate. Runs on every PR — agents must show green before a human merges
# (AGENTS.md: never auto-merge to main). Grows: + contract preflight, + lint, + unit,
# + scripted Lesson-1 smoke (fake providers) as those land.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Pin to the committed packageManager version. Without this, action-setup may install
          # a newer pnpm that treats esbuild's "ignored build script" warning as a fatal install
          # error. esbuild's binary ships via its @esbuild/<platform> optional dep, so the build
          # script is functionally unneeded; 11.5.0 keeps it a non-fatal warning. Keep in sync
          # with package.json "packageManager".
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (contract preflight — lesson-001 conforms to frozen LessonConfig)
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm -r run test
