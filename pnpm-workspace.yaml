# pnpm workspace — TypeScript main application.
# The Python offline tools layer (tools/) is intentionally NOT a workspace member.
packages:
  - "apps/*"
  - "packages/*"
# esbuild (vite/vitest) declares a build script, but its binary actually ships via the
# @esbuild/<platform> optional dep — so the (unrun) build script is functionally unneeded.
# `strictDepBuilds: false` makes pnpm treat an ignored build script as a non-fatal warning
# instead of ERR_PNPM_IGNORED_BUILDS, which otherwise fails `pnpm install` in CI. Verified in a
# clean-HOME CI-faithful run: install + typecheck + all tests pass with esbuild fully functional.
strictDepBuilds: false
onlyBuiltDependencies:
  - esbuild
